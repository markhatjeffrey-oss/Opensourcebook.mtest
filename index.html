<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-auth="required">

<div class="topbar">
  <div class="logo">facebook</div>
  <span>🏠</span>
  <span>👥</span>
  <span>💬</span>
  <span>🔔</span>
  <span onclick="logout()">☰</span>
</div>

<div class="container">

  <div class="card">
    <div class="pad post-box">
      <div class="avatar">U</div>
      <input id="postInput" type="text" placeholder="Write something here...">
      <input id="imgInput" type="file" accept="image/*">
      <button class="btn" onclick="addPost()">Post</button>
    </div>
  </div>

  <div class="card">
    <div class="stories">
      <div class="story">You</div>
      <div class="story">Friend 1</div>
      <div class="story">Friend 2</div>
      <div class="story">Friend 3</div>
    </div>
  </div>

  <div id="feed"></div>

</div>

<script src="assets/js/auth.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
